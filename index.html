<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪問看護出店支援アプリ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>訪問看護出店支援アプリ</h1>
  </header>

  <main>
    <div id="search-panel">
      <input id="address-input" type="text" placeholder="住所または地名を入力">
      <button id="search-button">検索</button>
      <div id="radius-switch">
        <button class="radius-button" data-radius="8000">8km</button>
        <button class="radius-button is-active" data-radius="10000">10km</button>
        <button class="radius-button" data-radius="12000">12km</button>
      </div>
      <p class="hint">地図をクリックして地点を指定することもできます</p>
    </div>
    <div id="map-row">
      <div id="map"></div>
      <div id="info-panel">
        <h2 id="population-heading">半径10km圏内の年齢別人口</h2>
        <p id="info-status" class="hint">地点を指定すると表示されます</p>
        <ul id="population-list"></ul>

        <h2>地域区分（介護報酬）</h2>
        <p id="chiiki-status" class="hint">地点を指定すると表示されます</p>
        <p id="chiiki-value"></p>

        <h2>訪問看護ステーション数</h2>
        <p id="houkan-status" class="hint">地点を指定すると表示されます</p>

        <h2>入院施設</h2>
        <p id="hospital-general-status" class="hint">地点を指定すると表示されます</p>
        <p id="hospital-psychiatric-status" class="hint"></p>

        <h2>訪問診療</h2>
        <p id="home-visit-status" class="hint">地点を指定すると表示されます</p>

        <h2>ケアマネージャー</h2>
        <p id="caremanager-status" class="hint">地点を指定すると表示されます</p>
        <p id="comprehensive-support-status" class="hint"></p>

        <h2>相談支援事業所</h2>
        <p id="consultation-office-status" class="hint">地点を指定すると表示されます</p>
        <p id="core-consultation-status" class="hint"></p>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js"></script>
  <script src="mesh.js"></script>
  <script src="mesh1-table-ids.js"></script>
  <script src="population.js"></script>
  <script src="chiiki-kubun.js"></script>
  <script src="facilities.js"></script>
  <script src="houkan-st-data.js"></script>
  <script src="hospitals-data.js"></script>
  <script src="home-visit-clinic-data.js"></script>
  <script src="caremanager-office-data.js"></script>
  <script src="comprehensive-support-center-data.js"></script>
  <script src="consultation-office-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
